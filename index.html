<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trakalog — Catalog Manager</title>
    <meta name="description" content="Your music catalog, organized & pitch-ready">
    <meta name="author" content="Trakalog" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trakalog — Catalog Manager" />
    <meta property="og:description" content="Your music catalog, organized & pitch-ready" />
    <meta property="og:image" content="/images/app-preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@trakalog" />
    <meta name="twitter:title" content="Trakalog — Catalog Manager" />
    <meta name="twitter:description" content="Your music catalog, organized & pitch-ready" />
    <meta name="twitter:image" content="/images/app-preview.png" />
  </head>

  <body>
    <script>
      // Apply theme, accent, and layout prefs before first render to prevent flash
      (function() {
        var d = document.documentElement;
        var theme = localStorage.getItem('trakalog-theme') || 'dark';
        var accent = localStorage.getItem('trakalog-accent') || 'sunset';
        var resolved = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        var classes = [resolved];
        if (localStorage.getItem('trakalog-compact') === '1') classes.push('compact');
        if (localStorage.getItem('trakalog-reduce-motion') === '1'
            || window.matchMedia('(prefers-reduced-motion: reduce)').matches) classes.push('reduce-motion');
        d.className = classes.join(' ');
        d.setAttribute('data-accent', accent);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
